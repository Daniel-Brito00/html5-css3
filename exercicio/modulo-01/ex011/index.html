<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídias em HTML</title>
    <style>
        body {
            margin: 0px;
        }
    </style>
</head>
<body>
   <h1>Imagem Dinâmica</h1>
    <p>Tente abrir esse site em vários dispositivos diferentes ou simplesmente aumente e diminua o tamanho do seu navegador</p>

    <picture>
        <source media="(max-width:750px)" srcset="img/p.jpg" type="image/png">
        <source media="(max-width:1000px)" srcset="img/m.jpg" type="image/png">
        <img src="img/g.jpg" alt="imagem-g">
    </picture>

    <h1>Reproduzindo audio</h1>
    <p>Vamos aprender a reproduzir áudios no HTML5</p>
    <audio preload="metadata" autoplay controls >
        <source src="midia/Thumbs On Ones - TrackTribe.mp3" type="audio/mpeg">
        <p>Infelizmente</p>
    </audio>

</body>
</html>
