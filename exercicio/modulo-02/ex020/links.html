<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personalizando links</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        
        a{
            color: red;
            text-decoration: none;
            font-weight: bold;
        }

        a:visited {
            color: darkred;
        }

        a:hover {
            text-decoration: underline;
        }

        a:active {
            color: blue;
        }

        a::before {
            content: '⚝ ';
            text-decoration: none;

        }

        a::after {
            content: ' ⚝';
        }
    </style>
</head>
<body>
    <h1>Personalizando links</h1>
    <ul>
        <li><a href="https://github.com/gustavoguanabara/html-css/tree/master/aulas-pdf" target="_blank">Github /gustavoguanabara</a></li>
        <li><a href="https://gustavoguanabara.github.io/" target="_blank">Repositório do cursoemvideo</a></li>
        <li><a href="https://www.youtube.com/" target="_blank">Youtube do cursoemvideo</a></li>
    </ul>
</body>
</html>
