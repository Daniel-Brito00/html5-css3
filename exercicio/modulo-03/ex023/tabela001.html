<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela 01</title>
    <style>
        body 
        {
            font-family: Arial, Helvetica, sans-serif;
        }
        table
        {
            width: 200px;
            border-collapse: collapse;
            text-align: center;
        }
        td
        {
            border: 1px solid black;
            padding: 5px;
        }
        tr.color-row
        {
            background-color: gray;
        }
        td.color 
        {
            background-color: red;
        }

    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <!--
        HIERARQUIA DE TABELAS SIMPLES
        
        TABLE = TABELA;
            TABLE ROW = LINHA DA TABELA;
            TABLE HEADER = CABEÇALHO DA TABELA;
            TABLE DATA = DADO DA TABELA;

    -->
    <table>
        <tr class="color-row">
            <td class="color">a1</td>
            <td>b1</td>
            <td>c1</td>
        </tr>
        <tr>
            <td>a2</td>
            <td class="color">b2</td>
            <td>c2</td>
        </tr>
        <tr>
            <td>a3</td>
            <td>b3</td>
            <td class="color">c3</td>
        </tr>
        <tr class="color-row">
            <td>a4</td>
            <td>b4</td>
            <td>c4</td>
        </tr>
    </table>
</body>
</html>
