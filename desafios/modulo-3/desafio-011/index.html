<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio</title>
    <style>
        body 
        {
            margin: 0px;
            padding: 0px;
            background-color: black;
        }

        .container
        {
            height: 100vh;
            width: 100%;
            position: relative;

            background: black url(img/espaco.jpg) no-repeat center center / cover fixed;
        }

        .astro {
            background: url(img/astronauta.png) no-repeat center center / 100% 100% fixed;
           
            position: absolute;

            height:350px;
            width: 350px;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%); 
        }
    </style>
</head>
<body>
    <main class="container">
        <div class="astro">

        </div>
    </main>
</body>
</html>
